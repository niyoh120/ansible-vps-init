# sshd

- name: Set authorized key taken from file
  ansible.posix.authorized_key:
    user: "{{ ansible_user }}"
    state: present
    key: "{{ lookup('file', item) }}"
  with_fileglob:
    - "{{ ssh_pub_key_path }}/*.pub"

- name: Set authorized key taken from file to root
  ansible.posix.authorized_key:
    user: root
    state: present
    key: "{{ lookup('file', item) }}"
  with_fileglob:
    - "{{ inventory_dir }}/*.pub"
  when: (enable_root_login | bool) and (ansible_user != "root")

- name: Set current user password when provided
  user:
    name: "{{ ansible_user }}"
    password: "{{ current_user_password }}"
    update_password: always
  when:
    - current_user_password is not none
    - (current_user_password | string | length) > 0

- name: Set root user password when provided
  user:
    name: root
    password: "{{ root_user_password }}"
    update_password: always
  when:
    - root_user_password is not none
    - (root_user_password | string | length) > 0

- name: Ensure PubkeyAuthentication is set to yes
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^PubkeyAuthentication"
    line: "PubkeyAuthentication yes"
    state: present

- name: Ensure AuthorizedKeysFile is set correctly
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^AuthorizedKeysFile"
    line: "AuthorizedKeysFile .ssh/authorized_keys"
    state: present

- name: Read current user authorized_keys to verify keys exist
  slurp:
    path: "~/.ssh/authorized_keys"
  register: _user_authorized_keys
  failed_when: false

- name: Disable password authentication
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^PasswordAuthentication"
    line: "PasswordAuthentication no"
    state: present
  when:
    - disable_password_login | bool
    - _user_authorized_keys.content is defined
    - (_user_authorized_keys.content | b64decode | trim | length) > 0

- name: Warn that password login was NOT disabled (no authorized key)
  debug:
    msg: >-
      WARNING: disable_password_login is true but no authorized key was found for
      user {{ ansible_user }}. Password login remains ENABLED to avoid locking out SSH access.
  when:
    - disable_password_login | bool
    - (_user_authorized_keys.content is undefined) or (_user_authorized_keys.content | b64decode | trim | length) == 0

- name: Disable keyboard interactive authentication
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^KbdInteractiveAuthentication"
    line: "KbdInteractiveAuthentication no"
    state: present
  when:
    - disable_password_login | bool
    - _user_authorized_keys.content is defined
    - (_user_authorized_keys.content | b64decode | trim | length) > 0

- name: Disable challenge response authentication
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^ChallengeResponseAuthentication"
    line: "ChallengeResponseAuthentication no"
    state: present
  when:
    - disable_password_login | bool
    - _user_authorized_keys.content is defined
    - (_user_authorized_keys.content | b64decode | trim | length) > 0

- name: Enable password authentication
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^PasswordAuthentication"
    line: "PasswordAuthentication yes"
    state: present
  when: not disable_password_login | bool

- name: Enable root login
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^PermitRootLogin"
    line: "PermitRootLogin yes"
    state: present
  when: (enable_root_login | bool) or (ansible_user == "root")

- name: Disable root login
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^PermitRootLogin"
    line: "PermitRootLogin no"
    state: present
  when: (not enable_root_login | bool) and (ansible_user != "root")

- name: Reload ssh service
  service:
    name: ssh
    state: reloaded
